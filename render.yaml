##########################################################
# Render.com Blueprint — Backend Only
# Frontend is deployed on Vercel (auto-detects Next.js)
#
# Deploy from the Render dashboard:
#   New > Blueprint > point to this repo
#
# After deploy, set these env vars in the Render dashboard
# (marked with sync: false below):
#
# wimc-backend:
#   SUPABASE_URL, SUPABASE_ANON_KEY,
#   SUPABASE_SERVICE_ROLE_KEY, SUPABASE_JWT_SECRET,
#   CORS_ORIGIN  (set to your Vercel frontend URL)
##########################################################

services:
  # ── Backend (NestJS) ──────────────────────────────────
  - type: web
    name: wimc-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/main
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: COMMISSION_BRONZE
        value: "20"
      - key: COMMISSION_SILVER
        value: "18"
      - key: COMMISSION_GOLD
        value: "15"
      - key: COMMISSION_PLATINUM
        value: "12"
      - key: PAYOUT_DELAY_DAYS
        value: "3"
      - key: MAX_UPLOAD_SIZE_MB
        value: "5"
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "WIMC <noreply@whatinmycloset.com>"
