##########################################################
# Render.com Blueprint
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy both services from the Render dashboard:
#   New > Blueprint > point to this repo
#
# After deploy, set these env vars in the Render dashboard
# for each service (marked with sync: false below):
#
# wimc-backend:
#   SUPABASE_URL, SUPABASE_ANON_KEY,
#   SUPABASE_SERVICE_ROLE_KEY, SUPABASE_JWT_SECRET,
#   CORS_ORIGIN  (set to your frontend Render URL)
#
# wimc-frontend:
#   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY,
#   NEXT_PUBLIC_API_URL  (set to your backend Render URL)
#   NEXT_PUBLIC_WS_URL   (same as NEXT_PUBLIC_API_URL)
##########################################################

services:
  # ── Backend (NestJS) ──────────────────────────────────
  - type: web
    name: wimc-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: COMMISSION_BRONZE
        value: "20"
      - key: COMMISSION_SILVER
        value: "18"
      - key: COMMISSION_GOLD
        value: "15"
      - key: COMMISSION_PLATINUM
        value: "12"
      - key: PAYOUT_DELAY_DAYS
        value: "3"
      - key: MAX_UPLOAD_SIZE_MB
        value: "5"

  # ── Frontend (Next.js) ────────────────────────────────
  - type: web
    name: wimc-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_USE_MOCK
        value: "false"
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_WS_URL
        sync: false
